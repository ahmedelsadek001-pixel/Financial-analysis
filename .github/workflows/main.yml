name: Automated Financial Analysis

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # ترقية النسخة لضمان الدعم الكامل للمكتبات الحديثة

      - name: Install Dependencies
        run: |
          pip install google-genai yfinance pandas

      - name: Run Analyzer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run_analysis.py

      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/*.md || true
          git commit -m "Update Daily Financial Report [Automated]" || exit 0
          git push origin main
