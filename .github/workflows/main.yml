name: Automated Financial Analysis

on:
  schedule:
    - cron: '0 0 * * *' # التشغيل التلقائي اليومي الافتراضي
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Enter the Ticker Symbol (e.g., GC=F, BTC-USD, EURUSD=X)'
        required: true
        default: 'GC=F'
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install google-genai yfinance pandas

      - name: Run Analyzer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SELECTED_SYMBOL: ${{ github.event.inputs.symbol || 'GC=F' }}
        run: python run_analysis.py
