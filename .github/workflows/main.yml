name: Automated Financial Analysis

on:
  schedule:
    - cron: '0 0 * * *' # تشغيل تلقائي يومي
  workflow_dispatch: # يتيح لك التشغيل اليدوي بضغطة زر

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-generativeai yfinance pandas

      - name: Run Analyzer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run_analysis.py

      - name: Commit Report
        run: |
          git config --global user.name 'Automated Financial Bot'
          git config --global user.email 'bot@github.com'
          git add reports/
          git commit -m "Update Daily Financial Report [Automated]" || exit 0
          git push
